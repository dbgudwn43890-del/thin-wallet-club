culture_sources:
  # 공연/전시 공식
  - name: 서울문화포털
    url: https://culture.seoul.go.kr
    category: seoul_culture
    priority: high
    notes: 서울 시립 문화시설 행사, 무료 전시/공연 정보.

  - name: 문화포털
    url: https://www.culture.go.kr
    category: national_culture
    priority: high
    notes: 국가 문화 행사 통합 정보. 무료 프로그램 다수.

  - name: 국립현대미술관 (MMCA)
    url: https://www.mmca.go.kr
    category: exhibition
    priority: high
    notes: 무료 상설전 + 기획전. 서울관/과천관/덕수궁관/청주관.

  - name: 서울시립미술관 (SeMA)
    url: https://sema.seoul.go.kr
    category: exhibition
    priority: high
    notes: 서울 주요 미술관. 무료 전시 많음. 서소문/북서울/남서울 등.

  - name: 국립중앙박물관
    url: https://www.museum.go.kr
    category: exhibition
    priority: high
    notes: 상설 무료 관람. 기획전 유료.

  - name: 세종문화회관
    url: https://www.sejongpac.or.kr
    category: performance
    priority: medium
    notes: 공연 정보. 할인 정책 자주 변경됨. 요확인.

  - name: 예술의전당
    url: https://www.sac.or.kr
    category: performance
    priority: medium
    notes: 클래식, 오페라, 연극 등. 청년 할인 확인 필요.

  # 독립 공간/갤러리
  - name: 국립아시아문화전당 (ACC)
    url: https://www.acc.go.kr
    category: exhibition
    priority: medium
    notes: 광주 기반. 서울 대상 계정에 포함 시 지역 명시 필수.

  - name: 서울아트책보고
    url: https://www.seoulartbookfair.com
    category: books_culture
    priority: medium
    notes: 아트북, 독립출판 관련 행사.

  # 온라인 큐레이션
  - name: 핀즈 (Pinz)
    url: https://pinz.kr
    category: curation
    priority: low
    notes: 서울 전시/팝업 큐레이션. 공식 출처 교차 확인 필요.

  - name: 위클리어스
    url: https://weekleus.com
    category: curation
    priority: low
    notes: 주간 전시/공연 정보. 공식 출처 교차 확인 필수.
