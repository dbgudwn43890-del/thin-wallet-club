  - name: 카카오 메이커스
    url: https://makers.kakao.com
    category: brand_program
    priority: low
    notes: 크리에이터 지원, 크라우드펀딩 형태.

  # 교육/커리어 브랜드
  - name: 네이버 커넥트재단
