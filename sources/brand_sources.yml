  # 문화/경험 브랜드
  - name: 현대카드 DIVE
    url: https://dive.hyundaicard.com
    category: culture_brand
    priority: high
    notes: 음악 공연, 전시, 강연 등 문화 프로그램. 현대카드 회원 혜택.

  - name: 현대카드 언더스테이지
