<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>001_free_seoul_exhibitions visual draft</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eee8de;
      --ink: #272522;
      --muted: #716b64;
      --card: #f7f3ec;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    }
    header {
      max-width: 1180px;
      margin: 0 auto;
      padding: 48px 24px 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.2;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 24px 64px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }
    figure {
      margin: 0;
      background: var(--card);
      border: 1px solid rgba(39, 37, 34, .14);
      padding: 12px;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 4 / 5;
      background: #f5f0e8;
    }
    figcaption {
      padding: 10px 2px 0;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <h1>001_free_seoul_exhibitions visual draft</h1>
    <p>Review-only SVG draft. Not a final upload asset. No external images, posters, artwork, or official key visuals are used.</p>
  </header>
  <main>
    <figure><img src="cards/slide_01.svg" alt="Slide 01"><figcaption>Slide 01 / Cover</figcaption></figure>
    <figure><img src="cards/slide_02.svg" alt="Slide 02"><figcaption>Slide 02 / Context</figcaption></figure>
    <figure><img src="cards/slide_03.svg" alt="Slide 03"><figcaption>Slide 03 / Yoo Youngkuk</figcaption></figure>
    <figure><img src="cards/slide_04.svg" alt="Slide 04"><figcaption>Slide 04 / Kwon Byungjun</figcaption></figure>
    <figure><img src="cards/slide_05.svg" alt="Slide 05"><figcaption>Slide 05 / West Seoul Museum</figcaption></figure>
    <figure><img src="cards/slide_06.svg" alt="Slide 06"><figcaption>Slide 06 / Foran</figcaption></figure>
    <figure><img src="cards/slide_07.svg" alt="Slide 07"><figcaption>Slide 07 / The Hybrid</figcaption></figure>
    <figure><img src="cards/slide_08.svg" alt="Slide 08"><figcaption>Slide 08 / CTA + Source</figcaption></figure>
  </main>
</body>
</html>
