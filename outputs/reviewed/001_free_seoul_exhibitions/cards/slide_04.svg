<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">소리로 보는 전시</title>
  <desc id="desc">네 번째 카드. 권병준 전시를 선과 간격으로 표현한다.</desc>
  <defs>
    <style>
      .bg { fill: #f4f0e8; }
      .ink { fill: #282621; }
      .muted { fill: #706b64; }
      .accent { stroke: #596c78; }
      .line { stroke: #282621; stroke-width: 2; opacity: .18; }
      text { font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing: 0; }
      .kicker { font-size: 24px; font-weight: 600; }
      .headline { font-size: 82px; font-weight: 800; }
      .body { font-size: 42px; font-weight: 600; }
      .note { font-size: 25px; font-weight: 500; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="1350"/>
  <g opacity=".65">
    <line x1="654" y1="150" x2="654" y2="780" class="accent" stroke-width="5"/>
    <line x1="704" y1="220" x2="704" y2="700" class="accent" stroke-width="3"/>
    <line x1="760" y1="116" x2="760" y2="836" class="accent" stroke-width="2"/>
    <line x1="834" y1="286" x2="834" y2="642" class="accent" stroke-width="6"/>
    <line x1="910" y1="188" x2="910" y2="752" class="accent" stroke-width="3"/>
  </g>
  <text x="92" y="132" class="kicker muted">02 / selected</text>
  <text x="92" y="328" class="headline ink">소리로</text>
  <text x="92" y="426" class="headline ink">보는 전시</text>
  <line x1="92" y1="492" x2="540" y2="492" class="line"/>
  <text x="92" y="620" class="body ink">소리, 기술, 감각이</text>
  <text x="92" y="692" class="body ink">겹쳐지는 설치 전시.</text>
  <text x="92" y="764" class="body ink">북서울미술관에서 길게 열려.</text>
  <g transform="translate(92 960)">
    <rect x="0" y="0" width="896" height="150" fill="#e6e1d8"/>
    <text x="36" y="58" class="note ink">기간 2026.06.11~2027.05.16</text>
    <text x="36" y="104" class="note muted">무료 | 서울 노원구</text>
  </g>
  <text x="92" y="1218" class="note muted">출처: 서울시립미술관 공식 전시 상세</text>
</svg>
