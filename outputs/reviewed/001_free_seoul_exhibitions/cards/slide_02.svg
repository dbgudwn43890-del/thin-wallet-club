<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">돈 안 쓰는 취향</title>
  <desc id="desc">두 번째 카드. 무료, 서울, 다양한 분위기의 리스트라는 맥락을 보여준다.</desc>
  <defs>
    <style>
      .bg { fill: #f5f0e8; }
      .ink { fill: #272522; }
      .muted { fill: #706a62; }
      .accent { fill: #637063; }
      .pale { fill: #e7dfd2; }
      .line { stroke: #272522; stroke-width: 2; opacity: .18; }
      text { font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing: 0; }
      .kicker { font-size: 24px; font-weight: 600; }
      .headline { font-size: 86px; font-weight: 800; }
      .body { font-size: 42px; font-weight: 600; }
      .num { font-size: 34px; font-weight: 700; }
      .note { font-size: 25px; font-weight: 500; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="1350"/>
  <text x="92" y="132" class="kicker muted">why save</text>
  <text x="92" y="292" class="headline ink">돈 안 쓰는</text>
  <text x="92" y="396" class="headline ink">취향</text>
  <line x1="92" y1="474" x2="988" y2="474" class="line"/>
  <text x="92" y="578" class="body ink">전부 무료.</text>
  <text x="92" y="650" class="body ink">서울 안에서 볼 수 있고,</text>
  <text x="92" y="722" class="body ink">분위기는 제각각.</text>
  <g transform="translate(92 848)">
    <rect x="0" y="0" width="896" height="230" rx="0" class="pale"/>
    <text x="42" y="72" class="num accent">01</text>
    <text x="210" y="72" class="num accent">02</text>
    <text x="378" y="72" class="num accent">03</text>
    <text x="546" y="72" class="num accent">04</text>
    <text x="714" y="72" class="num accent">05</text>
    <line x1="42" y1="120" x2="854" y2="120" stroke="#637063" stroke-width="3" opacity=".42"/>
    <circle cx="56" cy="120" r="8" class="accent"/>
    <circle cx="224" cy="120" r="8" class="accent"/>
    <circle cx="392" cy="120" r="8" class="accent"/>
    <circle cx="560" cy="120" r="8" class="accent"/>
    <circle cx="728" cy="120" r="8" class="accent"/>
    <text x="42" y="178" class="note muted">서소문</text>
    <text x="210" y="178" class="note muted">북서울</text>
    <text x="378" y="178" class="note muted">서서울</text>
    <text x="546" y="178" class="note muted">남서울</text>
    <text x="714" y="178" class="note muted">종로</text>
  </g>
  <text x="92" y="1216" class="note muted">방문 전 예약/운영시간 확인</text>
</svg>
