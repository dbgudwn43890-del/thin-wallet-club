      .accent { fill: #8b6f47; }
      text { font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing: 0; }
      .label { font-size: 26px; font-weight: 600; }
      .title { font-size: 132px; font-weight: 800; }
      .title-small { font-size: 72px; font-weight: 800; }
      .body { font-size: 35px; font-weight: 500; }
