<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">산과 색면</title>
  <desc id="desc">세 번째 카드. 유영국 전시를 추상적 색면 모티프로 표현한다.</desc>
  <defs>
    <style>
      .bg { fill: #f2eee4; }
      .ink { fill: #282621; }
      .muted { fill: #716d64; }
      .green { fill: #566b58; }
      .blue { fill: #38495b; }
      .sand { fill: #ddd3bf; }
      .line { stroke: #282621; stroke-width: 2; opacity: .2; }
      text { font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing: 0; }
      .kicker { font-size: 24px; font-weight: 600; }
      .headline { font-size: 92px; font-weight: 800; }
      .body { font-size: 42px; font-weight: 600; }
      .note { font-size: 25px; font-weight: 500; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="1350"/>
  <rect x="676" y="88" width="242" height="382" class="sand"/>
  <rect x="728" y="144" width="220" height="410" class="green" opacity=".9"/>
  <rect x="604" y="410" width="328" height="236" class="blue" opacity=".92"/>
  <text x="92" y="132" class="kicker muted">01 / selected</text>
  <text x="92" y="346" class="headline ink">산과 색면</text>
  <line x1="92" y1="410" x2="514" y2="410" class="line"/>
  <text x="92" y="540" class="body ink">한국 추상미술 거장</text>
  <text x="92" y="612" class="body ink">유영국을 크게 보는 전시.</text>
  <text x="92" y="684" class="body ink">서소문본관에서 10월까지.</text>
  <g transform="translate(92 960)">
    <rect x="0" y="0" width="896" height="150" fill="#ffffff" opacity=".35"/>
    <text x="36" y="58" class="note ink">기간 2026.05.19~10.25</text>
    <text x="36" y="104" class="note muted">무료 | 서울 중구</text>
  </g>
  <text x="92" y="1218" class="note muted">출처: 서울시립미술관 공식 전시 상세</text>
</svg>
